<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBF7F0"/>
      <stop offset="50%" stop-color="#F5EDE0"/>
      <stop offset="100%" stop-color="#EDE0CC"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <!-- Book shape -->
  <g transform="translate(230, 80)">
    <rect x="0" y="0" width="140" height="200" rx="4" fill="#C04040" opacity="0.15"/>
    <rect x="10" y="10" width="120" height="180" rx="2" fill="#FBF7F0"/>
    <!-- Book spine -->
    <rect x="0" y="0" width="8" height="200" rx="2" fill="#B8956A" opacity="0.4"/>
    <!-- Lines suggesting text -->
    <rect x="22" y="30" width="96" height="6" rx="3" fill="#2C2416" opacity="0.15"/>
    <rect x="22" y="45" width="80" height="6" rx="3" fill="#2C2416" opacity="0.12"/>
    <rect x="22" y="60" width="90" height="6" rx="3" fill="#2C2416" opacity="0.12"/>
    <rect x="22" y="75" width="70" height="6" rx="3" fill="#2C2416" opacity="0.10"/>
    <!-- Bug illustration -->
    <ellipse cx="70" cy="130" rx="20" ry="14" fill="#2C2416" opacity="0.2"/>
    <line x1="50" y1="120" x2="38" y2="108" stroke="#2C2416" stroke-width="2" opacity="0.15"/>
    <line x1="55" y1="125" x2="42" y2="118" stroke="#2C2416" stroke-width="2" opacity="0.15"/>
    <line x1="55" y1="135" x2="42" y2="142" stroke="#2C2416" stroke-width="2" opacity="0.15"/>
    <line x1="90" y1="120" x2="102" y2="108" stroke="#2C2416" stroke-width="2" opacity="0.15"/>
    <line x1="85" y1="125" x2="98" y2="118" stroke="#2C2416" stroke-width="2" opacity="0.15"/>
    <line x1="85" y1="135" x2="98" y2="142" stroke="#2C2416" stroke-width="2" opacity="0.15"/>
  </g>
  <!-- Title -->
  <text x="300" y="330" text-anchor="middle" font-family="Noto Serif TC, serif" font-size="28" font-weight="700" fill="#2C2416">《卡夫卡變蟲記》</text>
  <!-- Subtitle -->
  <text x="300" y="362" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="14" fill="#5B7B8A">AI 繪本故事 · 經典文學改編</text>
  <!-- Tag -->
  <rect x="250" y="372" width="100" height="22" rx="11" fill="#5B7B8A" opacity="0.12"/>
  <text x="300" y="387" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="11" fill="#5B7B8A">🎬 影片</text>
</svg>
