<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="50%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="320" r="120" fill="#C04040" opacity="0.06"/>
  <circle cx="520" cy="80" r="100" fill="#1E88E5" opacity="0.06"/>
  <!-- Icon: pen/pencil -->
  <g transform="translate(280, 130)">
    <rect x="0" y="0" width="40" height="120" rx="4" fill="#C04040" opacity="0.8"/>
    <rect x="4" y="0" width="32" height="60" rx="2" fill="#FBF7F0" opacity="0.6"/>
    <polygon points="0,120 20,140 40,120" fill="#2C2416" opacity="0.7"/>
    <circle cx="20" cy="144" r="4" fill="#2C2416" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="300" y="310" text-anchor="middle" font-family="Noto Serif TC, serif" font-size="32" font-weight="700" fill="#2C2416">寫作小精靈</text>
  <!-- Subtitle -->
  <text x="300" y="345" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="15" fill="#5B7B8A">AI 作文批改 · OCR 手寫辨識</text>
  <!-- Bottom tag -->
  <rect x="240" y="365" width="120" height="24" rx="12" fill="#C04040" opacity="0.12"/>
  <text x="300" y="382" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="11" fill="#C04040">Web App</text>
</svg>
